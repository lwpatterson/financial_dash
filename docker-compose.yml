version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - .:/workspace:cached
      - sqlite-data:/workspace/backend/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////workspace/backend/data/stocks.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /workspace/backend

  frontend:
    image: node:20-alpine
    volumes:
      - .:/workspace:cached
    ports:
      - "5173:5173"
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  sqlite-data:
